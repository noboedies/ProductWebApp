<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>ProductWebApp</title>
</head>
<body>
	<h1>ProductWebApp</h1>
	<hr>
	<h2>Search product</h2>
	<form action="SearchProduct" method="post">
		<label>Name:</label>
		<input type="text" name="name" required />
		<br><br>
		<button>Submit</button>
	</form>
	<hr>
	<h3>Add New product:</h3>
	<form action="AddProduct" method="post" enctype="multipart/form-data">
		<label>Name:</label>
		<input type='text' name='name' required /> <br><br>
		<label>Company Name:</label>
		<input type='text' name='cName' required /> <br><br>
		<label>Price:</label>
		<input type='number' min='1' name='price' required /> <br><br>
		<label>Description:</label>
		<textarea name="description" rows="3" cols="30"></textarea> <br><br>
		<p style='color:red;'>Image Size Exceed! (Allowed less than 2MB)</p>
		<label>Cover Image:</label>
       <input type='file' name='cImage' accept="image/*" /> <br><br>
       <label>Book Pdf:</label>
       <input type='file' name='ctn' accept=".pdf" /> <br><br>
		<button>Add</button>
	</form>
</body>
</html>
